name: 재고 대시보드 자동 업데이트
 
on:
  push:
    paths:
      - '**.xlsx'   # 엑셀 파일 업로드할 때만 실행
 
jobs:
  update-dashboard:
    runs-on: ubuntu-latest
 
    permissions:
      contents: write
 
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
 
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: 필요 패키지 설치
        run: pip install openpyxl
 
      - name: 대시보드 생성
        run: python generate.py
 
      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🔄 재고 대시보드 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
